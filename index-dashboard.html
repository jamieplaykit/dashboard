<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamie's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf7f4;
  --bg2: #f3ede6;
  --card: #fffcfa;
  --text: #2c2420;
  --muted: #9c8f87;
  --border: #e8ddd6;
  --rose: #c97b84;
  --rose-light: #f9eef0;
  --sage: #7d9b8a;
  --sage-light: #edf4f0;
  --peach: #d4956a;
  --peach-light: #fdf2eb;
  --lavender: #8b85b8;
  --lavender-light: #f0eef9;
  --cream: #f7f0e8;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* ── Grain overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

.page { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

/* ── Header ── */
header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
  animation: fadeUp 0.5s ease both;
}

.header-left {}

.greeting {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  font-weight: 300; line-height: 1.05;
  letter-spacing: -0.01em;
}

.greeting em { font-style: italic; color: var(--rose); }

.dateline {
  font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-top: 0.4rem; font-weight: 300;
}

.header-right { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

.quick-link {
  display: flex; align-items: center; gap: 0.4rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; padding: 0.4rem 0.9rem;
  font-size: 0.78rem; font-weight: 400; color: var(--text);
  text-decoration: none; transition: all 0.2s; white-space: nowrap;
}

.quick-link:hover { background: var(--rose-light); border-color: var(--rose); color: var(--rose); }
.quick-link .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose); flex-shrink: 0; }

/* ── Top row ── */
.top-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1.25rem; margin-bottom: 1.25rem;
}

@media (max-width: 780px) { .top-row { grid-template-columns: 1fr 1fr; } }
@media (max-width: 520px) { .top-row { grid-template-columns: 1fr; } }

/* ── Cards ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 1.5rem;
  animation: fadeUp 0.5s ease both;
}

.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }

.card-label {
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 1rem; font-weight: 500;
}

/* ── Weather ── */
.wx-main { display: flex; align-items: flex-end; gap: 0.6rem; margin-bottom: 0.3rem; }
.wx-temp { font-family: 'Cormorant Garamond', serif; font-size: 3.6rem; font-weight: 300; line-height: 1; }
.wx-icon { font-size: 2rem; margin-bottom: 0.2rem; }
.wx-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
.wx-stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
.wx-stat { font-size: 0.75rem; color: var(--muted); }
.wx-stat strong { display: block; color: var(--text); font-weight: 500; font-size: 0.85rem; }
.wx-forecast { display: flex; gap: 0.4rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.wx-day { flex: 1; text-align: center; font-size: 0.7rem; color: var(--muted); }
.wx-day .wdi { font-size: 1.1rem; display: block; margin: 0.25rem 0; }
.wx-day .whi { color: var(--text); font-weight: 500; font-size: 0.8rem; }

/* ── Mini stat cards ── */
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 1.5rem;
  display: flex; flex-direction: column; justify-content: space-between;
  animation: fadeUp 0.5s ease both;
}

.stat-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem; font-weight: 300; line-height: 1;
  margin-bottom: 0.25rem;
}

.stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 300; }

.stat-pill {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.7rem; padding: 0.25rem 0.6rem;
  border-radius: 100px; margin-top: 0.75rem; width: fit-content;
}

.pill-rose { background: var(--rose-light); color: var(--rose); }
.pill-sage { background: var(--sage-light); color: var(--sage); }
.pill-peach { background: var(--peach-light); color: var(--peach); }

/* ── AI Task Section ── */
.task-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden;
  animation: fadeUp 0.5s ease both; animation-delay: 0.2s;
}

.task-header {
  padding: 1.5rem 1.5rem 0;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
}

.task-title-row { display: flex; align-items: center; gap: 0.75rem; }

.ai-badge {
  display: inline-flex; align-items: center; gap: 0.3rem;
  background: var(--lavender-light); color: var(--lavender);
  font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
  font-weight: 500; padding: 0.25rem 0.7rem; border-radius: 100px;
}

.ai-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--lavender); animation: pulse 2s infinite; }

/* Tabs */
.tabs { display: flex; gap: 0; background: var(--bg2); border-radius: 100px; padding: 3px; }

.tab-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 0.78rem; font-weight: 400;
  color: var(--muted); padding: 0.35rem 1rem; border-radius: 100px;
  transition: all 0.2s; letter-spacing: 0.04em;
}

.tab-btn.active {
  background: var(--card); color: var(--text); font-weight: 500;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

/* Refresh */
.refresh-btn {
  background: none; border: 1px solid var(--border); border-radius: 100px;
  font-family: 'Jost', sans-serif; font-size: 0.75rem; color: var(--muted);
  padding: 0.35rem 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 0.4rem;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--rose); color: var(--rose); }
.refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

.task-body { padding: 1.25rem 1.5rem 1.5rem; min-height: 280px; }

/* Loading state */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 3rem 1rem; gap: 1rem;
}

.loading-spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--rose); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.loading-text { font-size: 0.82rem; color: var(--muted); text-align: center; line-height: 1.6; }
.loading-steps { font-size: 0.72rem; color: var(--muted); opacity: 0.7; text-align: center; }

/* Task items */
.task-group { margin-bottom: 1.5rem; }
.task-group:last-child { margin-bottom: 0; }

.task-group-label {
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.6rem; font-weight: 500;
  display: flex; align-items: center; gap: 0.5rem;
}

.task-group-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.task-item {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.65rem 0; border-bottom: 1px solid var(--border);
}
.task-item:last-child { border-bottom: none; }

.task-check {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--border); flex-shrink: 0;
  margin-top: 2px; cursor: pointer; transition: all 0.2s;
  background: none;
}
.task-check:hover { border-color: var(--rose); background: var(--rose-light); }
.task-check.checked { background: var(--rose); border-color: var(--rose); }

.task-content { flex: 1; }
.task-text { font-size: 0.88rem; line-height: 1.4; color: var(--text); }
.task-text.done { text-decoration: line-through; color: var(--muted); }
.task-meta { display: flex; gap: 0.5rem; margin-top: 0.25rem; flex-wrap: wrap; }

.task-source {
  font-size: 0.68rem; padding: 0.1rem 0.5rem; border-radius: 100px;
  font-weight: 400;
}
.src-notion { background: var(--cream); color: #6b5f52; }
.src-granola { background: var(--sage-light); color: var(--sage); }
.src-slack { background: #f0f0ff; color: #6b6bcc; }
.src-gmail { background: #fff0f0; color: #cc4444; }
.src-gcal { background: var(--peach-light); color: var(--peach); }

.task-due { font-size: 0.68rem; color: var(--muted); }
.task-due.urgent { color: var(--rose); font-weight: 500; }

/* Error / empty */
.empty-state {
  text-align: center; padding: 2.5rem 1rem;
  font-size: 0.85rem; color: var(--muted); line-height: 1.7;
}
.empty-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

/* ── Bottom row ── */
.bottom-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1.25rem; margin-top: 1.25rem;
}
@media (max-width: 600px) { .bottom-row { grid-template-columns: 1fr; } }

/* Bookmarks */
.bm-add { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.bm-add input {
  flex: 1; font-family: 'Jost', sans-serif; font-size: 0.82rem;
  border: 1px solid var(--border); border-radius: 10px;
  padding: 0.45rem 0.75rem; background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.bm-add input:focus { border-color: var(--rose); }
.bm-add button {
  background: var(--rose); color: #fff; border: none;
  border-radius: 10px; width: 32px; font-size: 1.1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s; flex-shrink: 0;
}
.bm-add button:hover { opacity: 0.85; }

.bm-grid { display: flex; flex-direction: column; gap: 0.35rem; }
.bm-item {
  display: flex; align-items: center; gap: 0.6rem;
  background: var(--bg); border: 1px solid transparent;
  border-radius: 10px; padding: 0.5rem 0.75rem;
  text-decoration: none; color: var(--text); font-size: 0.82rem;
  transition: all 0.15s;
}
.bm-item:hover { background: var(--rose-light); border-color: var(--rose); }
.bm-item img { width: 14px; height: 14px; border-radius: 3px; }
.bm-item .bm-name { flex: 1; font-weight: 400; }
.bm-item .bm-domain { font-size: 0.7rem; color: var(--muted); }
.bm-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 0.9rem; transition: color 0.15s; }
.bm-del:hover { color: #c0392b; }

/* Notes */
.notes-area {
  width: 100%; min-height: 120px; resize: vertical;
  font-family: 'Jost', sans-serif; font-size: 0.85rem; line-height: 1.6;
  border: 1px solid var(--border); border-radius: 10px;
  padding: 0.75rem; background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.notes-area:focus { border-color: var(--rose); }
.notes-saved { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; opacity: 0; transition: opacity 0.3s; }
.notes-saved.show { opacity: 1; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="greeting">Good <em id="tod">morning</em>, Jamie.</div>
      <div class="dateline" id="dateline"></div>
    </div>
    <div class="header-right">
      <a href="https://www.notion.so" target="_blank" rel="noopener" class="quick-link" id="notionHubLink">
        <span class="dot"></span> Strategy Lead Hub
      </a>
    </div>
  </header>

  <!-- Top row: weather + two stat cards -->
  <div class="top-row">
    <div class="card" id="wxCard">
      <div class="card-label">Roseland, NJ</div>
      <div id="wxContent"><div style="color:var(--muted);font-size:0.82rem">Loading…</div></div>
    </div>
    <div class="stat-card" id="statToday">
      <div>
        <div class="card-label">Due today</div>
        <div class="stat-number" id="countToday">—</div>
        <div class="stat-label">tasks</div>
      </div>
      <div class="stat-pill pill-rose" id="urgentPill" style="display:none">● urgent</div>
    </div>
    <div class="stat-card" id="statWeek">
      <div>
        <div class="card-label">This week</div>
        <div class="stat-number" id="countWeek">—</div>
        <div class="stat-label">tasks</div>
      </div>
      <div class="stat-pill pill-sage" id="weekPill" style="display:none">● on track</div>
    </div>
  </div>

  <!-- AI Task Section -->
  <div class="task-section">
    <div class="task-header">
      <div class="task-title-row">
        <div class="card-label" style="margin:0">Your tasks</div>
        <div class="ai-badge"><span class="ai-dot"></span>AI-synced</div>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap">
        <div class="tabs">
          <button class="tab-btn active" data-tab="daily" onclick="switchTab('daily')">Daily</button>
          <button class="tab-btn" data-tab="weekly" onclick="switchTab('weekly')">Weekly</button>
          <button class="tab-btn" data-tab="monthly" onclick="switchTab('monthly')">Monthly</button>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchTasks()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>
    <div class="task-body" id="taskBody">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Gathering your tasks…</div>
        <div class="loading-steps" id="loadSteps">Connecting to your tools</div>
      </div>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="bottom-row">
    <!-- Bookmarks -->
    <div class="card" style="animation-delay:0.25s">
      <div class="card-label">Quick links</div>
      <div class="bm-add">
        <input id="bmName" placeholder="Name" maxlength="40">
        <input id="bmUrl" placeholder="https://…" maxlength="200" style="flex:1.5">
        <button onclick="addBm()">+</button>
      </div>
      <div class="bm-grid" id="bmGrid"></div>
    </div>

    <!-- Notes -->
    <div class="card" style="animation-delay:0.3s">
      <div class="card-label">Quick notes</div>
      <textarea class="notes-area" id="notesArea" placeholder="Jot anything down…"></textarea>
      <div class="notes-saved" id="notesSaved">Saved ✓</div>
    </div>
  </div>

</div>

<script>
// ── Header ────────────────────────────────────────────────────────
(function() {
  const now = new Date();
  const h = now.getHours();
  document.getElementById('tod').textContent = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  document.getElementById('dateline').textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
})();

// ── Weather ───────────────────────────────────────────────────────
async function loadWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.82066&longitude=-74.29376&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&forecast_days=5');
    const d = await r.json(); const c = d.current; const day = d.daily;
    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',61:'🌧️',63:'🌧️',80:'🌦️',95:'⛈️'};
    const descs = {0:'clear',1:'mostly clear',2:'partly cloudy',3:'overcast',45:'foggy',51:'drizzle',61:'light rain',63:'rain',80:'showers',95:'thunderstorm'};
    const icon = k => icons[k] || '🌡️'; const desc = k => descs[k] || 'weather';
    const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let fc = '';
    for (let i=1;i<=4;i++) { const dt = new Date(day.time[i]+'T12:00'); fc += `<div class="wx-day"><span>${dn[dt.getDay()]}</span><span class="wdi">${icon(day.weather_code[i])}</span><span class="whi">${Math.round(day.temperature_2m_max[i])}°</span><br><span style="font-size:0.68rem;color:var(--muted)">${Math.round(day.temperature_2m_min[i])}°</span></div>`; }
    document.getElementById('wxContent').innerHTML = `
      <div class="wx-main"><div class="wx-temp">${Math.round(c.temperature_2m)}°</div><div class="wx-icon">${icon(c.weather_code)}</div></div>
      <div class="wx-desc">${desc(c.weather_code)} · feels ${Math.round(c.apparent_temperature)}°F</div>
      <div class="wx-stats">
        <div class="wx-stat"><strong>${Math.round(c.wind_speed_10m)} mph</strong>Wind</div>
        <div class="wx-stat"><strong>${c.relative_humidity_2m}%</strong>Humidity</div>
        <div class="wx-stat"><strong>${Math.round(day.temperature_2m_max[0])}° / ${Math.round(day.temperature_2m_min[0])}°</strong>Hi / Lo</div>
      </div>
      <div class="wx-forecast">${fc}</div>`;
  } catch(e) { document.getElementById('wxContent').innerHTML = '<div style="color:var(--muted);font-size:0.82rem">Weather unavailable</div>'; }
}
loadWeather();

// ── AI Task Fetcher ───────────────────────────────────────────────
let currentTab = 'daily';
let allTasks = [];
let checkedTasks = JSON.parse(localStorage.getItem('dash_checked') || '{}');

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (allTasks.length) renderTasks(allTasks);
  else fetchTasks();
}

const loadingMsgs = [
  'Reading your Notion pages…',
  'Scanning Granola meeting notes…',
  'Checking Slack mentions…',
  'Skimming Gmail threads…',
  'Pulling Google Calendar…',
  'Asking Claude to sort it all out…'
];

async function fetchTasks() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  document.getElementById('taskBody').innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Gathering your tasks from all your tools…</div>
      <div class="loading-steps" id="loadSteps">${loadingMsgs[0]}</div>
    </div>`;

  let step = 0;
  const stepInterval = setInterval(() => {
    step = Math.min(step + 1, loadingMsgs.length - 1);
    const el = document.getElementById('loadSteps');
    if (el) el.textContent = loadingMsgs[step];
  }, 1800);

  const today = new Date().toISOString().split('T')[0];
  const windowLabel = currentTab === 'daily' ? 'today' : currentTab === 'weekly' ? 'this week' : 'this month';

  try {
    const response = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a personal assistant for Jamie, a Strategy Lead. Today's date is ${today}.
Your job: use the available MCP tools to gather tasks, action items, meetings, and deadlines from all connected sources — Notion, Granola (meeting notes), Slack (mentions/DMs), Gmail (action items), and Google Calendar.

Gather information, then respond ONLY with a JSON array (no markdown, no preamble) like:
[
  {
    "text": "task description",
    "source": "notion|granola|slack|gmail|gcal",
    "due": "YYYY-MM-DD or null",
    "priority": "high|medium|low",
    "group": "overdue|today|tomorrow|this_week|this_month|someday"
  }
]

Assign group based on due date relative to today (${today}).
Focus on tasks due ${windowLabel}. Include up to 20 tasks maximum.
Return only valid JSON array, nothing else.`,
        messages: [{ role: 'user', content: `Please gather all my tasks and action items due ${windowLabel} from all my connected tools (Notion, Granola, Slack, Gmail, Google Calendar) and return them as a JSON array.` }],
        mcp_servers: [
          { type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion' },
          { type: 'url', url: 'https://mcp.granola.ai/mcp', name: 'granola' },
          { type: 'url', url: 'https://mcp.slack.com/mcp', name: 'slack' },
          { type: 'url', url: 'https://gmailmcp.googleapis.com/mcp/v1', name: 'gmail' },
          { type: 'url', url: 'https://calendarmcp.googleapis.com/mcp/v1', name: 'gcal' }
        ]
      })
    });

    clearInterval(stepInterval);
    btn.classList.remove('spinning');

    const data = await response.json();
    const raw = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '[]';
    const clean = raw.replace(/```json|```/g, '').trim();
    allTasks = JSON.parse(clean);

    updateStatCards(allTasks);
    renderTasks(allTasks);

  } catch(e) {
    clearInterval(stepInterval);
    btn.classList.remove('spinning');
    document.getElementById('taskBody').innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">🔌</span>
        Could not load tasks. Make sure your connectors are authorized in Claude.<br>
        <span style="font-size:0.75rem;margin-top:0.5rem;display:block">${e.message}</span>
      </div>`;
  }
}

function updateStatCards(tasks) {
  const today = new Date().toISOString().split('T')[0];
  const endOfWeek = new Date(); endOfWeek.setDate(endOfWeek.getDate() + 7);
  const todayTasks = tasks.filter(t => t.due === today || t.group === 'today' || t.group === 'overdue');
  const weekTasks = tasks.filter(t => t.group === 'today' || t.group === 'tomorrow' || t.group === 'this_week' || t.group === 'overdue');
  document.getElementById('countToday').textContent = todayTasks.length || '0';
  document.getElementById('countWeek').textContent = weekTasks.length || '0';
  const hasUrgent = todayTasks.some(t => t.priority === 'high');
  if (hasUrgent) document.getElementById('urgentPill').style.display = 'inline-flex';
  if (weekTasks.length > 0) document.getElementById('weekPill').style.display = 'inline-flex';
}

const groupOrder = ['overdue', 'today', 'tomorrow', 'this_week', 'this_month', 'someday'];
const groupLabels = { overdue: '⚠️ Overdue', today: 'Today', tomorrow: 'Tomorrow', this_week: 'This week', this_month: 'This month', someday: 'Someday' };

const tabGroups = {
  daily: ['overdue', 'today', 'tomorrow'],
  weekly: ['overdue', 'today', 'tomorrow', 'this_week'],
  monthly: ['overdue', 'today', 'tomorrow', 'this_week', 'this_month', 'someday']
};

function renderTasks(tasks) {
  const allowed = tabGroups[currentTab];
  const filtered = tasks.filter(t => allowed.includes(t.group));

  if (!filtered.length) {
    document.getElementById('taskBody').innerHTML = `<div class="empty-state"><span class="empty-icon">✨</span>You're all clear for ${currentTab === 'daily' ? 'today' : currentTab === 'weekly' ? 'this week' : 'this month'}!</div>`;
    return;
  }

  const grouped = {};
  allowed.forEach(g => { grouped[g] = []; });
  filtered.forEach(t => { if (grouped[t.group]) grouped[t.group].push(t); });

  let html = '';
  allowed.forEach(g => {
    if (!grouped[g] || !grouped[g].length) return;
    html += `<div class="task-group"><div class="task-group-label">${groupLabels[g]}</div>`;
    grouped[g].forEach((t, i) => {
      const id = `${g}-${i}`;
      const done = !!checkedTasks[id];
      html += `<div class="task-item">
        <button class="task-check ${done ? 'checked' : ''}" onclick="toggleCheck('${id}', this)"></button>
        <div class="task-content">
          <div class="task-text ${done ? 'done' : ''}">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="task-source src-${t.source || 'notion'}">${t.source || 'notion'}</span>
            ${t.due ? `<span class="task-due ${t.group === 'overdue' ? 'urgent' : ''}">${t.due}</span>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('taskBody').innerHTML = html;
}

function toggleCheck(id, el) {
  checkedTasks[id] = !checkedTasks[id];
  localStorage.setItem('dash_checked', JSON.stringify(checkedTasks));
  el.classList.toggle('checked');
  const textEl = el.parentElement.querySelector('.task-text');
  if (textEl) textEl.classList.toggle('done', checkedTasks[id]);
}

// ── Bookmarks ─────────────────────────────────────────────────────
let bms = JSON.parse(localStorage.getItem('dash_bms') || '[{"name":"Strategy Lead Hub","url":"https://notion.so"}]');

function saveBms() { localStorage.setItem('dash_bms', JSON.stringify(bms)); }

function renderBms() {
  const g = document.getElementById('bmGrid');
  if (!bms.length) { g.innerHTML = '<div style="font-size:0.8rem;color:var(--muted);font-style:italic">No links yet</div>'; return; }
  g.innerHTML = bms.map((b, i) => {
    const domain = (() => { try { return new URL(b.url).hostname; } catch { return ''; } })();
    return `<div style="display:flex;align-items:center;gap:0.4rem">
      <a href="${escAttr(b.url)}" target="_blank" rel="noopener" class="bm-item">
        <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" onerror="this.style.display='none'" alt="" style="width:14px;height:14px;border-radius:3px">
        <span class="bm-name">${escHtml(b.name)}</span>
        <span class="bm-domain">${domain}</span>
      </a>
      <button class="bm-del" onclick="delBm(${i})">×</button>
    </div>`;
  }).join('');
}

function addBm() {
  const name = document.getElementById('bmName').value.trim();
  let url = document.getElementById('bmUrl').value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  bms.unshift({ name, url }); saveBms(); renderBms();
  document.getElementById('bmName').value = ''; document.getElementById('bmUrl').value = '';
}

function delBm(i) { bms.splice(i,1); saveBms(); renderBms(); }
document.getElementById('bmUrl').addEventListener('keydown', e => { if (e.key==='Enter') addBm(); });
renderBms();

// ── Notes ─────────────────────────────────────────────────────────
const notesArea = document.getElementById('notesArea');
const notesSaved = document.getElementById('notesSaved');
notesArea.value = localStorage.getItem('dash_notes') || '';
let saveTimeout;
notesArea.addEventListener('input', () => {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    localStorage.setItem('dash_notes', notesArea.value);
    notesSaved.classList.add('show');
    setTimeout(() => notesSaved.classList.remove('show'), 1500);
  }, 600);
});

// ── Utils ─────────────────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

// ── Boot ──────────────────────────────────────────────────────────
fetchTasks();
</script>
</body>
</html>

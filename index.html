<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamie's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ed;
    --card: #fff;
    --text: #1a1814;
    --muted: #888070;
    --border: #e5e0d8;
    --accent: #c96a2e;
    --accent-light: #fdf0e8;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 2rem;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .greeting {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
  }

  .greeting em {
    font-style: italic;
    color: var(--accent);
  }

  .date-line {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.4rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.25rem;
    max-width: 1100px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .card-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  /* Weather */
  .weather-main {
    display: flex;
    align-items: flex-end;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .weather-temp {
    font-family: 'Instrument Serif', serif;
    font-size: 4rem;
    line-height: 1;
    color: var(--text);
  }

  .weather-icon {
    font-size: 2.5rem;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .weather-desc {
    font-size: 0.9rem;
    color: var(--muted);
    text-transform: capitalize;
    margin-bottom: 1rem;
  }

  .weather-row {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
  }

  .weather-stat {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .weather-stat strong {
    color: var(--text);
    font-weight: 500;
    display: block;
    font-size: 0.9rem;
  }

  .forecast {
    display: flex;
    gap: 0.5rem;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }

  .forecast-day {
    flex: 1;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .forecast-day .f-icon { font-size: 1.25rem; display: block; margin: 0.3rem 0; }
  .forecast-day .f-hi { color: var(--text); font-weight: 500; font-size: 0.85rem; }

  /* Tasks */
  .task-input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .task-input-row input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .task-input-row input:focus { border-color: var(--accent); }

  .task-input-row button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .task-input-row button:hover { opacity: 0.85; }

  .task-list { list-style: none; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }

  .task-item:last-child { border-bottom: none; }

  .task-item input[type="checkbox"] {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .task-item label {
    flex: 1;
    cursor: pointer;
    transition: color 0.15s;
  }

  .task-item.done label {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-del {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
  }

  .task-del:hover { color: #c0392b; }

  .task-empty {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    padding: 0.5rem 0;
  }

  /* Bookmarks */
  .bm-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .bm-input-row input {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .bm-input-row input:focus { border-color: var(--accent); }

  .bm-input-row button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    width: 34px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }

  .bm-input-row button:hover { opacity: 0.85; }

  .bm-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .bm-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    text-decoration: none;
    color: var(--text);
    font-size: 0.85rem;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .bm-item:hover { background: var(--accent-light); border-color: var(--accent); }

  .bm-item .bm-favicon {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .bm-item .bm-name { flex: 1; font-weight: 500; }
  .bm-item .bm-url { color: var(--muted); font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }

  .bm-del {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0 2px;
    transition: color 0.15s;
  }

  .bm-del:hover { color: #c0392b; }

  .bm-empty {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Weather card spans wider */
  .weather-card {
    grid-column: span 2;
  }

  @media (max-width: 640px) {
    .weather-card { grid-column: span 1; }
    .bm-input-row { grid-template-columns: 1fr auto; }
    .bm-input-row input:last-of-type { display: none; }
  }

  .error-msg { font-size: 0.85rem; color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="greeting">Good <em id="timeOfDay">morning</em>, Jamie.</div>
  <div class="date-line" id="dateDisplay"></div>
</header>

<div class="grid">

  <!-- Weather Card -->
  <div class="card weather-card" id="weatherCard">
    <div class="card-label">Roseland, NJ</div>
    <div id="weatherContent"><div class="error-msg">Loading weather…</div></div>
  </div>

  <!-- Tasks Card -->
  <div class="card">
    <div class="card-label">Today's tasks</div>
    <div class="task-input-row">
      <input type="text" id="taskInput" placeholder="Add a task…" maxlength="120">
      <button onclick="addTask()" title="Add task">+</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
  </div>

  <!-- Bookmarks Card -->
  <div class="card">
    <div class="card-label">Quick links</div>
    <div class="bm-input-row">
      <input type="text" id="bmName" placeholder="Name" maxlength="40">
      <input type="text" id="bmUrl" placeholder="https://…" maxlength="200">
      <button onclick="addBookmark()" title="Add bookmark">+</button>
    </div>
    <div class="bm-list" id="bmList"></div>
  </div>

</div>

<script>
// ── Date / greeting ────────────────────────────────────────────────
function updateHeader() {
  const now = new Date();
  const h = now.getHours();
  const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  document.getElementById('timeOfDay').textContent = tod;
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
}
updateHeader();

// ── Weather ────────────────────────────────────────────────────────
const LAT = 40.82066, LON = -74.29376;

function weatherIcon(code, isDay) {
  if (code === 0) return isDay ? '☀️' : '🌙';
  if (code <= 2) return isDay ? '⛅' : '🌙';
  if (code === 3) return '☁️';
  if (code <= 48) return '🌫️';
  if (code <= 57) return '🌧️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦️';
  if (code <= 86) return '🌨️';
  if (code >= 95) return '⛈️';
  return '🌡️';
}

function weatherDesc(code) {
  const map = {0:'clear sky',1:'mostly clear',2:'partly cloudy',3:'overcast',45:'foggy',48:'icy fog',51:'light drizzle',53:'drizzle',55:'heavy drizzle',61:'light rain',63:'rain',65:'heavy rain',71:'light snow',73:'snow',75:'heavy snow',80:'showers',81:'rain showers',82:'heavy showers',85:'snow showers',95:'thunderstorm',96:'thunderstorm w/ hail',99:'severe thunderstorm'};
  return map[code] || 'weather';
}

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&forecast_days=5`;
    const res = await fetch(url);
    const d = await res.json();
    const c = d.current;
    const days = d.daily;

    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let forecastHTML = '';
    for (let i = 1; i <= 4; i++) {
      const dt = new Date(days.time[i] + 'T12:00:00');
      forecastHTML += `<div class="forecast-day">
        <span>${dayNames[dt.getDay()]}</span>
        <span class="f-icon">${weatherIcon(days.weather_code[i], true)}</span>
        <span class="f-hi">${Math.round(days.temperature_2m_max[i])}°</span>
        <span style="color:var(--muted);font-size:0.75rem">${Math.round(days.temperature_2m_min[i])}°</span>
      </div>`;
    }

    document.getElementById('weatherContent').innerHTML = `
      <div class="weather-main">
        <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
        <div class="weather-icon">${weatherIcon(c.weather_code, c.is_day)}</div>
      </div>
      <div class="weather-desc">${weatherDesc(c.weather_code)} · feels like ${Math.round(c.apparent_temperature)}°</div>
      <div class="weather-row">
        <div class="weather-stat"><strong>${Math.round(c.wind_speed_10m)} mph</strong>Wind</div>
        <div class="weather-stat"><strong>${c.relative_humidity_2m}%</strong>Humidity</div>
        <div class="weather-stat"><strong>${Math.round(days.temperature_2m_max[0])}° / ${Math.round(days.temperature_2m_min[0])}°</strong>Today hi/lo</div>
      </div>
      <div class="forecast">${forecastHTML}</div>
    `;
  } catch(e) {
    document.getElementById('weatherContent').innerHTML = '<div class="error-msg">Could not load weather.</div>';
  }
}
loadWeather();

// ── Tasks ──────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('dash_tasks') || '[]');

function saveTasks() { localStorage.setItem('dash_tasks', JSON.stringify(tasks)); }

function renderTasks() {
  const list = document.getElementById('taskList');
  if (!tasks.length) {
    list.innerHTML = '<li class="task-empty">Nothing yet — add something above.</li>';
    return;
  }
  list.innerHTML = tasks.map((t, i) => `
    <li class="task-item ${t.done ? 'done' : ''}">
      <input type="checkbox" id="t${i}" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
      <label for="t${i}">${escHtml(t.text)}</label>
      <button class="task-del" onclick="deleteTask(${i})" title="Remove">×</button>
    </li>
  `).join('');
}

function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  tasks.unshift({ text, done: false });
  saveTasks(); renderTasks();
  inp.value = '';
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  saveTasks(); renderTasks();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  saveTasks(); renderTasks();
}

document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
renderTasks();

// ── Bookmarks ──────────────────────────────────────────────────────
let bookmarks = JSON.parse(localStorage.getItem('dash_bookmarks') || '[]');

function saveBookmarks() { localStorage.setItem('dash_bookmarks', JSON.stringify(bookmarks)); }

function renderBookmarks() {
  const list = document.getElementById('bmList');
  if (!bookmarks.length) {
    list.innerHTML = '<div class="bm-empty">No links yet — add one above.</div>';
    return;
  }
  list.innerHTML = bookmarks.map((b, i) => {
    const domain = (() => { try { return new URL(b.url).hostname; } catch { return ''; } })();
    return `<div style="display:flex;align-items:center;gap:0.5rem">
      <a href="${escAttr(b.url)}" target="_blank" rel="noopener" class="bm-item" style="flex:1">
        <img class="bm-favicon" src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" onerror="this.style.display='none'" alt="">
        <span class="bm-name">${escHtml(b.name)}</span>
        <span class="bm-url">${domain}</span>
      </a>
      <button class="bm-del" onclick="deleteBookmark(${i})" title="Remove">×</button>
    </div>`;
  }).join('');
}

function addBookmark() {
  const name = document.getElementById('bmName').value.trim();
  let url = document.getElementById('bmUrl').value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  bookmarks.unshift({ name, url });
  saveBookmarks(); renderBookmarks();
  document.getElementById('bmName').value = '';
  document.getElementById('bmUrl').value = '';
}

document.getElementById('bmUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addBookmark(); });
renderBookmarks();

// ── Utils ──────────────────────────────────────────────────────────
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return s.replace(/"/g,'&quot;'); }
</script>
</body>
</html>
